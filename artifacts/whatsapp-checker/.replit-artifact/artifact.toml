kind = "web"
  previewPath = "/"
  title = "WhatsApp Checker"
  version = "1.0.0"
  id = "artifacts/whatsapp-checker"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 23059

  [services.development]
  run = "pnpm --filter @workspace/whatsapp-checker run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/whatsapp-checker", "run", "build" ]
  run = "pnpm --filter @workspace/whatsapp-checker run start"

  [services.env]
  PORT = "23059"
  BASE_PATH = "/"
  PYTHON_PORT = "5000"

  [[services]]
  name = "api"
  paths = [ "/api" ]
  localPort = 5000

  [services.development]
  run = "node wa-server.mjs"

  [services.env]
  PYTHON_PORT = "5000"
